# TODO: Build your image and push it to Docker Hub automatically on every merge to master.
# Use the repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN — do NOT hard-code them.
name: Build and Push to Docker Hub

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # TODO: check out the code
      - name: Checkout code
        uses: actions/checkout@v4
      # TODO: log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # TODO: build from your Dockerfile and push the image,
      #       tagged with the app version (e.g. 0.2) AND the commit SHA
      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/clo835-a2:0.2 .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/clo835-a2:0.2 \
                     ${{ secrets.DOCKERHUB_USERNAME }}/clo835-a2:${{ github.sha }}

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clo835-a2:0.2
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/clo835-a2:${{ github.sha }}